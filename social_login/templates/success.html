{% load socialaccount %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Login</title>
    
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    
    <style>
        body {
            background-color: #000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }

        .success-container {
            text-align: center;
            padding: 2.5rem;
            border-radius: 1.5rem;
            background-color: #111;
            box-shadow: 0 10px 30px rgba(149, 104, 255, 0.1);
            max-width: 450px;
            width: 90%;
        }

        .success-icon {
            font-size: 4.5rem;
            color: #28a745;
            margin-bottom: 1rem;
        }

        .token-box {
            background-color: #1c1f2a;
            border: 1px solid #333;
            border-radius: 0.8rem;
            text-align: left;
            padding: 1.2rem;
            margin-top: 1.5rem;
            word-break: break-all;
        }

        .btn-custom {
            background-color: #9568ff;
            border: none;
            font-size: 1.1rem;
            padding: 0.8rem 2rem;
            border-radius: 0.6rem;
            color: white;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
            margin-top: 1.5rem;
        }

        .btn-custom:hover {
            background-color: #7a46f0;
            transform: translateY(-2px);
            color: white;
        }

        code { color: #00d4ff; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="success-container">
        <i class="fas fa-check-circle success-icon"></i>
        <h2 class="mb-2">نجحت العملية!</h2>
        <p class="text-muted">مرحباً بك، {{ username }}</p>

        <div class="token-box">
            <p class="small text-warning mb-1"><i class="fas fa-key mr-1"></i> Access Token:</p>
            <code>{{ access }}</code>
        </div>

        <button onclick="sendToFlutter()" class="btn btn-custom">
            <i class="fas fa-arrow-left mr-2"></i> العودة للتطبيق
        </button>

        <p class="mt-3 small text-muted">سيتم مزامنة بياناتك مع التطبيق الآن</p>
    </div>

    <script>
        function sendToFlutter() {
            // إعداد كائن البيانات
            const authData = {
                'status': 'success',
                'access': '{{ access }}',
                'refresh': '{{ refresh }}',
                'username': '{{ username }}'
            };

            // التحقق من وجود قناة اتصال مع فلاتر (JavaScript Channel)
            if (window.ToApp) {
                window.ToApp.postMessage(JSON.stringify(authData));
            } else {
                console.log("Flutter Bridge Not Found", authData);
                alert("تم توليد التوكن بنجاح! يرجى العودة للتطبيق يدوياً إذا لم يتم تحويلك.");
            }
        }

        // اختياري: إرسال البيانات تلقائياً بعد 3 ثوانٍ
        // window.onload = () => setTimeout(sendToFlutter, 3000);
    </script>

</body>
</html>
